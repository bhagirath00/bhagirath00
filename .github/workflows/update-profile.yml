name: Update GitHub Profile README SVGs

on:
  schedule:
    - cron: '0 0 * * 0' # Runs once a week (every Sunday at midnight)

  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'


      - name: Install dependencies
        run: |
          pip install python-dateutil requests

      - name: Generate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASCII_ART_URL: ${{ secrets.ASCII_ART_URL }}
        run: |
          python update_profile.py


      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          git diff-index --quiet HEAD || (git commit -m "chore: update profile SVGs" && git push)
